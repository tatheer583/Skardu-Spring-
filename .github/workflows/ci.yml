name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm install

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
      env:
        # These are build-time env vars if any are needed
        NEXT_PUBLIC_API_URL: http://localhost:5000

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install
